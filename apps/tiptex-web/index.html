<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOTPAXEL - Tiptex Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom scrollbar for a cleaner UI */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      /* Tiptap Specific Styles for WYSIWYG feel */
      .ProseMirror {
        outline: none;
        min-height: 100%;
        padding: 2rem;
        max-width: 65ch; /* Optimal reading width */
        margin: 0 auto;
      }
      
      .ProseMirror p {
        margin-bottom: 1rem;
        line-height: 1.75;
      }

      /* Styles for the Protected Token Node */
      .hot-token {
        display: inline-flex;
        align-items: center;
        background-color: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1e40af;
        padding: 0 0.375rem;
        border-radius: 0.25rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.875em;
        user-select: all;
        cursor: default;
        white-space: nowrap;
      }
      
      .hot-token:hover {
        background-color: #dbeafe;
        border-color: #93c5fd;
      }
    </style>
  <script type="importmap">

    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@^3.18.0",
    "@tiptap/react": "https://esm.sh/@tiptap/react@^3.18.0",
    "@tiptap/core": "https://esm.sh/@tiptap/core@^3.18.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
