version: '3.8'

services:
  # Tiptex Web (Frontend + Nginx)
  tiptex-web:
    build:
      context: .
      dockerfile: apps/tiptex-web/Dockerfile
    ports:
      - "8888:80"
    depends_on:
      - paxel

  # Phase 3 implementation
  paxel:
    build:
      context: .
      dockerfile: apps/paxel/Dockerfile
    # Remove public port 8888 exposure, accessed via nginx internally
    expose:
      - "8888"
    environment:
      - PORT=8888
      - ENABLE_ASSETS=true
      - JOB_TIMEOUT_MS=300000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
