version: '3.8'

services:
  # Phase 3 implementation
  paxel:
    build:
      context: .
      dockerfile: services/paxel/Dockerfile
    ports:
      - "8888:8888"
    environment:
      - PORT=8888
      - ENABLE_ASSETS=true
      - JOB_TIMEOUT_MS=300000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
