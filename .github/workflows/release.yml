name: Release (Docker & NPM)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (@hotpaxel/hot)
        run: wasm-pack build --target web --release --scope hotpaxel
        working-directory: crates/hot

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build tiptex-web
        run: bun run build
        working-directory: apps/tiptex-web

      - name: Upload @hotpaxel/tiptex-web artifact
        uses: actions/upload-artifact@v6
        with:
          name: tiptex-web
          path: apps/tiptex-web/dist/

      - name: Upload @hotpaxel/hot package artifact
        uses: actions/upload-artifact@v6
        with:
          name: hot
          path: crates/hot/pkg/

  build-backend:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: paxel-amd64
          - target: aarch64-unknown-linux-gnu
            artifact_name: paxel-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build backend
        run: cargo zigbuild --release --target ${{ matrix.target }}
        working-directory: crates/paxel

      - name: Upload backend artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/paxel

  npm-publish:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM OIDC provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download @hotpaxel/hot package
        uses: actions/download-artifact@v6
        with:
          name: hot
          path: crates/hot/pkg

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish to NPM (@hotpaxel/hot)
        run: npm publish --access public --tag alpha
        working-directory: crates/hot/pkg

  docker-publish:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download @hotpaxel/tiptex-web artifact
        uses: actions/download-artifact@v6
        with:
          name: tiptex-web
          path: dist

      - name: Download amd64 backend artifact
        uses: actions/download-artifact@v6
        with:
          name: paxel-amd64
          path: artifacts/amd64

      - name: Download arm64 backend artifact
        uses: actions/download-artifact@v6
        with:
          name: paxel-arm64
          path: artifacts/arm64

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push unified image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/hotpaxel.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/hotpaxel:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/hotpaxel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
