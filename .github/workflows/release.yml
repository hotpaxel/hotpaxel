name: Release (Docker & NPM)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (@hotpaxel/hot)
        run: wasm-pack build --target web --release
        working-directory: crates/hot

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build tiptex-web
        run: bun run build
        working-directory: apps/tiptex-web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/tiptex-web/dist/

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/hot/pkg/

# Removed build-backend job in favor of unified Docker build

  npm-publish:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM OIDC provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WASM package artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: crates/hot/pkg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inspect package.json
        run: cat package.json
        working-directory: crates/hot/pkg

      - name: Publish to NPM
        run: |
          # Ensure no old auth interferes with OIDC
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --provenance --access public --tag alpha
        working-directory: crates/hot/pkg

  docker-publish:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push unified image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/hotpaxel:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/hotpaxel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
