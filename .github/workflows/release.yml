name: Release (Docker & NPM)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (@hotpaxel/hot)
        run: wasm-pack build --target web --release --scope hotpaxel
        working-directory: crates/hot

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build tiptex-web
        run: bun run build
        working-directory: apps/tiptex-web

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/tiptex-web/dist/

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/hot/pkg/

  build-backend:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: paxel-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm64
            artifact_name: paxel-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build backend
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: crates/paxel

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/paxel

  npm-publish:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM OIDC provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WASM package artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: crates/hot/pkg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
        working-directory: crates/hot/pkg

  docker-publish:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tiptex-web
            dockerfile: .docker/tiptex-web.Dockerfile
            name: tiptex-web
          - image: paxel
            dockerfile: .docker/paxel.Dockerfile
            name: paxel
          - image: hotpaxel
            dockerfile: .docker/hotpaxel.Dockerfile
            name: hotpaxel
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout repository (for nginx configs and Dockerfiles)
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: paxel-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          path: .
      
      # Make sure the downloaded binary is executable
      - name: Make binary executable
        run: chmod +x paxel

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.ref_name }}-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
