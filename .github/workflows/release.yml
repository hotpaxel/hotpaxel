name: Release (Docker & NPM)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  VERSION: ${{ github.ref_name }} # e.g. v0.2.0-alpha.3

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Sync version from tag
        run: |
          # Remove 'v' prefix if present
          VER=$(echo "${{ env.VERSION }}" | sed 's/^v//')
          echo "Syncing version to $VER"
          # Root Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VER\"/" Cargo.toml
          # Only published package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" crates/hot/package.json

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (@hotpaxel/hot)
        run: wasm-pack build --target web --release --scope hotpaxel
        working-directory: crates/hot

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build tiptex-web
        run: bun run build
        working-directory: apps/tiptex-web

      - name: Upload @hotpaxel/tiptex-web artifact
        uses: actions/upload-artifact@v6
        with:
          name: tiptex-web
          path: apps/tiptex-web/dist/

      - name: Upload @hotpaxel/hot package artifact
        uses: actions/upload-artifact@v6
        with:
          name: hot
          path: crates/hot/pkg/

  build-backend:
    name: Build Backend (${{ matrix.arch }})
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Sync version from tag
        run: |
          VER=$(echo "${{ env.VERSION }}" | sed 's/^v//')
          sed -i "s/^version = \".*\"/version = \"$VER\"/" Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" crates/hot/package.json

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build backend
        run: cargo zigbuild --release --target ${{ matrix.target }}
        working-directory: crates/paxel

      - name: Upload backend artifact
        uses: actions/upload-artifact@v6
        with:
          name: paxel-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/paxel

  npm-publish:
    name: NPM Publish
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NPM OIDC provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download @hotpaxel/hot package
        uses: actions/download-artifact@v6
        with:
          name: hot
          path: crates/hot/pkg

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish to NPM (@hotpaxel/hot)
        run: npm publish --access public --tag alpha
        working-directory: crates/hot/pkg

  docker-publish-hotpaxel:
    name: Docker Publish (Hotpaxel - Unified)
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download @hotpaxel/tiptex-web artifact
        uses: actions/download-artifact@v6
        with:
          name: tiptex-web
          path: dist

      - name: Download amd64 backend artifact
        uses: actions/download-artifact@v6
        with:
          name: paxel-amd64
          path: artifacts/amd64

      - name: Download arm64 backend artifact
        uses: actions/download-artifact@v6
        with:
          name: paxel-arm64
          path: artifacts/arm64

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Hotpaxel (Unified)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/hotpaxel.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/hotpaxel:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/hotpaxel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish-paxel:
    name: Docker Publish (Paxel - Backend)
    needs: [build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download amd64 backend artifact
        uses: actions/download-artifact@v6
        with:
          name: paxel-amd64
          path: artifacts/amd64

      - name: Download arm64 backend artifact
        uses: actions/download-artifact@v6
        with:
          name: paxel-arm64
          path: artifacts/arm64

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Paxel (Backend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/paxel.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/paxel:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/paxel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish-tiptex-web:
    name: Docker Publish (TipTeX Web - Frontend)
    needs: [build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download @hotpaxel/tiptex-web artifact
        uses: actions/download-artifact@v6
        with:
          name: tiptex-web
          path: dist

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push TipTeX Web (Frontend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/tiptex-web.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/tiptex-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/tiptex-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: [build-frontend, build-backend, npm-publish, docker-publish-hotpaxel, docker-publish-paxel, docker-publish-tiptex-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download paxel-amd64
        uses: actions/download-artifact@v6
        with:
          name: paxel-amd64
          path: release-artifacts/paxel-amd64

      - name: Download paxel-arm64
        uses: actions/download-artifact@v6
        with:
          name: paxel-arm64
          path: release-artifacts/paxel-arm64

      - name: Download tiptex-web
        uses: actions/download-artifact@v6
        with:
          name: tiptex-web
          path: release-artifacts/tiptex-web

      - name: Prepare release artifacts (ZIP)
        run: |
          # Use internal filenames as original 'paxel', but zip with descriptive names
          cd release-artifacts/paxel-amd64 && zip ../../paxel-linux-amd64-${{ github.ref_name }}.zip paxel && cd ../..
          cd release-artifacts/paxel-arm64 && zip ../../paxel-linux-arm64-${{ github.ref_name }}.zip paxel && cd ../..
          cd release-artifacts/tiptex-web && zip -r ../../tiptex-web-${{ github.ref_name }}.zip ./* && cd ../..

      - name: Generate release notes
        id: generate_notes
        run: |
          # Fetch auto-generated notes from GitHub API
          # This will use the categories defined in .github/release.yml
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/generate-notes"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            $API_URL \
            -d "{\"tag_name\":\"${{ github.ref_name }}\"}")
          
          NOTES=$(echo "$RESPONSE" | jq -r '.body')
          
          # Prepare deployment footer
          FOOTER="
          ## 🚀 Deployment Options
          
          ### 📦 All-in-One (Unified)
          Full-stack solution with Backend and Frontend integrated in a single container.
          - 🐳 **Docker Image:** [ghcr.io/${{ github.repository_owner }}/hotpaxel:${{ github.ref_name }}](https://github.com/${{ github.repository }}/pkgs/container/hotpaxel)
          
          ### 🏗️ Server + UI (Distributed)
          Separate components for flexible and scalable architecture.
          - 💻 **Backend (Docker):** [ghcr.io/${{ github.repository_owner }}/paxel:${{ github.ref_name }}](https://github.com/${{ github.repository }}/pkgs/container/paxel)
          - 🌐 **Frontend (Docker):** [ghcr.io/${{ github.repository_owner }}/tiptex-web:${{ github.ref_name }}](https://github.com/${{ github.repository }}/pkgs/container/tiptex-web)
          - 💾 **Binaries:** See the **Assets** section below for platform-specific ZIP files.
          
          ### 📚 Library & SDK
          - 📦 **NPM Package:** [@hotpaxel/hot](https://www.npmjs.com/package/@hotpaxel/hot)
          "
          
          # Combine Auto Notes + Custom Footer
          FINAL_BODY="${NOTES}${FOOTER}"
          
          # Escape for GitHub Actions output
          {
            echo "body<<EOF"
            echo "$FINAL_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.generate_notes.outputs.body }}
          files: |
            paxel-linux-amd64-${{ github.ref_name }}.zip
            paxel-linux-arm64-${{ github.ref_name }}.zip
            tiptex-web-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta')
